<div class="page-layout">
  
  <h1 class="login-main-title">SOUL FOOD<br>AI</h1>

  <div class="login-card">
    
    <h2 class="login-title">REGISTRO</h2>

    <form (ngSubmit)="register()">
      
      <div class="input-group">
        <div class="label-row">
          <label>NOMBRE DE USUARIO</label>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" class="login-input" [(ngModel)]="username" name="username" placeholder="Tu apodo o nombre">
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label>EMAIL</label>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input type="email" class="login-input" [(ngModel)]="email" name="email" placeholder="soulfoodai@email.com">
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label>CONTRASEÑA</label>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" class="login-input" [(ngModel)]="password" name="password" placeholder="••••••••"> 
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label>REPETIR CONTRASEÑA</label>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" class="login-input" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••"> 
        </div>
      </div>

      <p *ngIf="errorMessage" style="color: #ef4444; font-size: 0.85rem; font-weight: 700; text-align: center; margin-top: 5px;">
        {{ errorMessage }}
      </p>

      <button type="submit" class="login-btn">
        CREAR CUENTA 
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

      <p class="register-text">
        ¿Ya tienes cuenta? <a routerLink="/login" class="register-link">Inicia sesión</a>
      </p>
    </form>
  </div>
</div>
