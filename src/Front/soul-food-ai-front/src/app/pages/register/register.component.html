<div class="page-layout">
  
  <h1 class="auth-main-title">SOUL FOOD<br>AI</h1>

  <div class="auth-card">
    
    <h2 class="auth-title">CREAR CUENTA</h2>

    <form (ngSubmit)="register()">
      
      <div class="input-group">
        <div class="label-row">
          <label>NOMBRE</label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="auth-input" [(ngModel)]="name" name="name" placeholder="Liza Klymenko" required>
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label>Email</label>
        </div>
        <div class="input-wrapper">
          <input type="email" class="auth-input" [(ngModel)]="email" name="email" placeholder="soulfoodai@email.com" required>
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label>CONTRASEÑA</label>
        </div>
        <div class="input-wrapper">
          <input type="password" class="auth-input has-icon-right" [(ngModel)]="password" name="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="auth-btn">CREAR CUENTA</button>

      <p class="auth-footer-text">
        Ya tienes cuenta? <a routerLink="/" class="auth-link">Log in</a>
      </p>
    </form>

  </div>
</div>
