<div class="page-layout">
  
  <h1 class="login-main-title">SOUL FOOD<br>AI</h1>

  <div class="login-card">
    
    <h2 class="login-title">LOGIN</h2>

    <form (ngSubmit)="login()">
      <div class="input-group">
        <div class="label-row">
          <label for="email">EMAIL</label>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input id="email" type="email" 
                 class="login-input" 
                 name="email" 
                 [(ngModel)]="email" 
                 placeholder="soulfoodai@email.com" 
                 required>
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="password">CONTRASEÑA</label>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input id="password" type="password" 
                 class="login-input" 
                 name="password" 
                 [(ngModel)]="password" 
                 placeholder="••••••••" 
                 required> 
        </div>
      </div>

      <p *ngIf="errorMessage" style="color: #e74c3c; font-size: 0.85rem; text-align: center; margin-bottom: 10px; font-weight: bold;">
        {{ errorMessage }}
      </p>

      <button type="submit" class="login-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'VERIFICANDO...' : 'LOGIN' }}
        <svg *ngIf="!isSubmitting" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        </svg>
      </button>

      <p class="register-text">
        No tienes cuenta? <a routerLink="/register" class="register-link">Registro</a>
      </p>
    </form>
  </div>
</div>
