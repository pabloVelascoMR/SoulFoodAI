<div class="page-layout">
  
  <h1 class="login-main-title">SOUL FOOD<br>AI</h1>

  <div class="login-card">
    
    <h2 class="login-title">LOGIN</h2>

    <form>
      <div class="input-group">
        <div class="label-row">
          <label>Email Address</label>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input type="email" class="login-input" placeholder="hello@soulfood.ai">
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label>Password</label>
          <a href="#" class="forgot-link">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" class="login-input" placeholder="••••••••">
          <svg class="icon-right" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </div>
      </div>

      <button type="submit" class="login-btn">
        LOGIN 
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

      <p class="register-text">
        Don't have an account? <span class="register-link">Register</span>
      </p>
    </form>
  </div>
</div>
