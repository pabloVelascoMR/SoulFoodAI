<div class="selection-container">

  <header class="stepper">
    <div 
      *ngFor="let step of steps; let i = index" 
      class="step-item"
      [class.active]="i === currentStepIndex"
      [class.completed]="i < currentStepIndex"
    >
      <div class="step-circle">{{ i + 1 }}</div>
      <span class="step-label">{{ step.name }}</span>
    </div>
  </header>

  <main class="content">
    <div class="section-header">
      <h1 class="section-title">{{ steps[currentStepIndex].name }}</h1>
      <p class="section-subtitle">Selecciona tus ingredientes favoritos.</p>
      
      <button class="btn-create-custom" (click)="openCustomModal()">
        + Añadir mi propio ingrediente
      </button>
    </div>

    <section class="ingredients-grid">
      <div *ngFor="let ingredient of currentIngredients" class="ingredient-card">
        
        <div class="card-image-wrapper">
          <img *ngIf="!ingredient.hasImageError && getIngredientImage(ingredient)" 
               [src]="getIngredientImage(ingredient)" 
               (error)="handleImageError($event, ingredient)"
               [alt]="ingredient.name" 
               class="card-image">
          
          <div *ngIf="ingredient.hasImageError || !getIngredientImage(ingredient)" class="emoji-display">
            {{ ingredient.icon || '🍽️' }}
          </div>

          <div class="card-action-overlay">
            <div class="overlay-buttons">
              <button class="action-btn" (click)="toggleIngredientSelection(ingredient)">
                {{ isIngredientSelected(ingredient) ? 'Deseleccionar' : 'Seleccionar' }}
              </button>
              
              <button class="action-btn-secondary" 
                      *ngIf="canEdit(ingredient)" 
                      (click)="editCustomIngredient(ingredient, $event)">
                Editar
              </button>
            </div>
          </div>

          <div class="card-selected-tick" *ngIf="isIngredientSelected(ingredient)">
            <svg class="tick-icon" viewBox="0 0 24 24">
              <path fill="currentColor" d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z" />
            </svg>
          </div>

          <div class="card-delete-x" 
               *ngIf="canDelete(ingredient) && !isIngredientSelected(ingredient)"
               (click)="deleteCustomIngredient(ingredient, $event)">
            <svg class="x-icon" viewBox="0 0 24 24">
              <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
            </svg>
          </div>

        </div>

        <div class="card-name">{{ ingredient.name }}</div>
      </div>
    </section>
  </main>

  <footer class="final-actions">
    <button class="btn-nav" [style.visibility]="currentStepIndex === 0 ? 'hidden' : 'visible'" (click)="previousStep()">Anterior</button>
    <button *ngIf="currentStepIndex < steps.length - 1" class="btn-primary" (click)="nextStep()">Siguiente Categoría</button>
    <button *ngIf="currentStepIndex === steps.length - 1" class="btn-primary">Finalizar</button>
  </footer>

  <div class="modal-overlay" *ngIf="showCustomModal">
    <div class="modal-content">
      <h2 class="modal-title">{{ isEditing ? 'Editar Ingrediente' : 'Crear Ingrediente' }}</h2>
      
      <div class="form-group">
        <label>Nombre del alimento:</label>
        <input type="text" class="modal-input" [(ngModel)]="newIngredient.name">
      </div>
      
      <div class="form-group">
        <label>Categoría:</label>
        <select class="modal-input" [(ngModel)]="newIngredient.category">
          <option *ngFor="let step of steps" [value]="step.name">{{ step.name }}</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Icono o Emoji:</label>
        <input type="text" class="modal-input" [(ngModel)]="newIngredient.icon">
      </div>

      <div class="macros-grid">
        <div class="form-group">
          <label>Kcal:</label>
          <input type="number" class="modal-input" [(ngModel)]="newIngredient.kcal">
        </div>
        <div class="form-group">
          <label>Proteína (g):</label>
          <input type="number" class="modal-input" [(ngModel)]="newIngredient.protein">
        </div>
        <div class="form-group">
          <label>Carbos (g):</label>
          <input type="number" class="modal-input" [(ngModel)]="newIngredient.carbs">
        </div>
        <div class="form-group">
          <label>Grasas (g):</label>
          <input type="number" class="modal-input" [(ngModel)]="newIngredient.fat">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeCustomModal()">Cancelar</button>
        <button class="btn-save" (click)="saveCustomIngredient()">
          {{ isEditing ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>

</div>
